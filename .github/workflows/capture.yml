name: capture-fingerprints

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser (leave blank to run full default matrix)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - chrome
          - firefox
          - edge
          - safari
      browser_version:
        description: >
          Browser version to capture, e.g. "130", "130.0.6723.69", "beta", "dev", "canary".
          Leave blank or "stable" for the runner default. Only applies when browser is set.
          Comma-separated values are accepted to run multiple versions in parallel (e.g. "130,131,132").
        required: false
        default: 'stable'
      os:
        description: 'Runner OS. Comma-separated values accepted (e.g. "ubuntu-24.04,macos-15,windows-2025"). Leave blank for browser default.'
        required: false
        default: ''
      mode:
        description: 'Run mode (leave blank to use the default for the selected browser+os)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - xvfb
          - headless
          - headed

permissions:
  contents: write   # needed to push fingerprint commits

jobs:
  setup_matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        shell: python
        env:
          INPUT_BROWSER: ${{ inputs.browser }}
          INPUT_BROWSER_VERSION: ${{ inputs.browser_version }}
          INPUT_OS: ${{ inputs.os }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          import json, os

          browser         = os.environ.get("INPUT_BROWSER", "").strip()
          browser_version = os.environ.get("INPUT_BROWSER_VERSION", "stable").strip() or "stable"
          override_os     = os.environ.get("INPUT_OS", "").strip()
          override_mode   = os.environ.get("INPUT_MODE", "").strip()

          DEFAULT_MATRIX = [
              {"os": "ubuntu-24.04",  "browser": "chrome",  "mode": "xvfb",     "browser_version": "stable"},
              {"os": "ubuntu-24.04",  "browser": "firefox", "mode": "headless",  "browser_version": "stable"},
              {"os": "macos-15",      "browser": "chrome",  "mode": "headless",  "browser_version": "stable"},
              {"os": "macos-15",      "browser": "firefox", "mode": "headless",  "browser_version": "stable"},
              {"os": "macos-15",      "browser": "safari",  "mode": "headed",    "browser_version": "stable"},
              {"os": "windows-2025",  "browser": "chrome",  "mode": "headless",  "browser_version": "stable"},
              {"os": "windows-2025",  "browser": "firefox", "mode": "headless",  "browser_version": "stable"},
              {"os": "windows-2025",  "browser": "edge",    "mode": "headless",  "browser_version": "stable"},
          ]

          # Mapping matrix to determine the execution mode based on the targeted OS + Browser combination
          MODE_DEFAULTS = {
              ("ubuntu-24.04", "chrome"): "xvfb",
              ("ubuntu-24.04", "firefox"): "headless",
              ("macos-15", "safari"): "headed",
          }
          
          # Single fallback defaults if no OS is provided at all
          BROWSER_DEFAULTS = {
              "chrome":  {"os": "ubuntu-24.04", "mode": "xvfb"},
              "firefox": {"os": "ubuntu-24.04", "mode": "headless"},
              "edge":    {"os": "windows-2025", "mode": "headless"},
              "safari":  {"os": "macos-15",      "mode": "headed"},
          }

          if browser:
              # Parse inputs into lists
              versions = [v.strip() for v in browser_version.split(",") if v.strip()]
              
              if override_os:
                  target_oses = [o.strip() for o in override_os.split(",") if o.strip()]
              else:
                  # Fallback to the default single OS for this browser
                  browser_fallback = BROWSER_DEFAULTS.get(browser, {"os": "ubuntu-24.04", "mode": "headless"})
                  target_oses = [browser_fallback["os"]]

              include_entries = []
              
              # Loop through every combination of OS and Version
              for target_os in target_oses:
                  for version in versions:
                      # Determine mode: 
                      # 1. User global mode override takes highest priority
                      # 2. Specific OS+Browser mapping matches second
                      # 3. Default fallback to "headless"
                      resolved_mode = override_mode or MODE_DEFAULTS.get((target_os, browser), "headless")
                      
                      include_entries.append({
                          "os":              target_os,
                          "browser":         browser,
                          "mode":            resolved_mode,
                          "browser_version": version,
                      })
                      
              matrix = {"include": include_entries}
          else:
              matrix = {"include": DEFAULT_MATRIX}

          output = json.dumps(matrix)
          print(f"matrix={output}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={output}\n")

  capture:
    needs: setup_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup_matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Install pinned Chrome
        id: setup_chrome
        if: matrix.browser == 'chrome' && matrix.browser_version != 'stable'
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: ${{ matrix.browser_version }}

      - name: Install pinned Firefox
        id: setup_firefox
        if: matrix.browser == 'firefox' && matrix.browser_version != 'stable'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: ${{ matrix.browser_version }}

      - name: Install pinned Edge
        id: setup_edge
        if: matrix.browser == 'edge' && matrix.browser_version != 'stable'
        uses: browser-actions/setup-edge@v1
        with:
          edge-version: ${{ matrix.browser_version }}

      - name: Set PYTHONPATH (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE/server:$GITHUB_WORKSPACE/parser:$GITHUB_WORKSPACE/harness" \
              >> "$GITHUB_ENV"

      - name: Set PYTHONPATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = "$env:GITHUB_WORKSPACE\server;$env:GITHUB_WORKSPACE\parser;$env:GITHUB_WORKSPACE\harness"
          "PYTHONPATH=$paths" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install -r server/requirements.txt
          pip install -r parser/requirements.txt
          pip install -r harness/requirements.txt

      - name: Configure /etc/hosts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "127.0.0.1 capture.localhost api.localhost cdn.localhost ws.localhost" \
              | sudo tee -a /etc/hosts

      - name: Configure hosts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content `
            -Path "$env:SystemRoot\System32\drivers\etc\hosts" `
            -Value "127.0.0.1 capture.localhost api.localhost cdn.localhost ws.localhost"

      - name: Start capture server
        shell: bash
        run: |
          python -m capture_server \
              --port 8443 \
              --bind 127.0.0.1 \
              --out ./captures \
              --cert-dir ./certs > server.log 2>&1 &
          echo $! > server.pid

          python - << 'EOF'
          import ssl, socket, time, sys
          deadline = time.monotonic() + 15
          while time.monotonic() < deadline:
              try:
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE
                  with socket.create_connection(("127.0.0.1", 8443), timeout=1) as s:
                      with ctx.wrap_socket(s):
                          pass
                  print("Server ready.", file=sys.stderr)
                  sys.exit(0)
              except Exception:
                  time.sleep(0.3)
          print("Server did not start in time.", file=sys.stderr)
          sys.exit(1)
          EOF

      - name: Trust cert and enable safaridriver (Safari only)
        if: matrix.browser == 'safari'
        timeout-minutes: 5
        shell: bash
        run: |
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain \
            ./certs/cert.pem
          sudo safaridriver --enable

      - name: Run harness
        id: capture
        shell: bash
        env:
          # Paths set by the setup-chrome / setup-firefox / setup-edge actions
          CHROME_BINARY: ${{ steps.setup_chrome.outputs.chrome-path }}
          FIREFOX_BINARY: ${{ steps.setup_firefox.outputs.firefox-path }}
          EDGE_BINARY: ${{ steps.setup_edge.outputs.edge-path }}
        run: |
          BINARY_PATH=""
          if [[ -n "$CHROME_BINARY" ]]; then
            BINARY_PATH="$CHROME_BINARY"
          elif [[ -n "$FIREFOX_BINARY" ]]; then
            BINARY_PATH="$FIREFOX_BINARY"
          elif [[ -n "$EDGE_BINARY" ]]; then
            BINARY_PATH="$EDGE_BINARY"
          fi

          HARNESS_ARGS=("--browser" "${{ matrix.browser }}" "--captures-dir" "./captures")

          if [[ "${{ matrix.mode }}" == "xvfb" ]]; then
            HARNESS_ARGS+=("--xvfb")
          elif [[ "${{ matrix.mode }}" == "headless" ]]; then
            HARNESS_ARGS+=("--headless")
          fi

          if [[ "${{ matrix.browser_version }}" != "stable" ]]; then
            HARNESS_ARGS+=("--browser-version" "${{ matrix.browser_version }}")
          fi

          if [[ -n "$BINARY_PATH" ]]; then
            HARNESS_ARGS+=("--binary" "$BINARY_PATH")
          fi

          SID=$(python -m capture_harness "${HARNESS_ARGS[@]}")
          echo "session_id=$SID" >> "$GITHUB_OUTPUT"

      - name: Stop server
        if: always()
        shell: bash
        run: sleep 5 && kill "$(cat server.pid)" 2>/dev/null || true

      - name: Parse capture
        shell: bash
        run: |
          python -m capture_parser \
              "./captures/${{ steps.capture.outputs.session_id }}" \
              --out ./fingerprints

      - name: Name fingerprint
        shell: bash
        env:
          SESSION_ID: ${{ steps.capture.outputs.session_id }}
        run: |
          python - << 'PYEOF'
          import json, os, re, shutil
          from pathlib import Path

          sid = os.environ["SESSION_ID"]
          h = json.loads(Path(f"captures/{sid}/harness.json").read_text())

          browser = h["browser"].lower()
          version = h["browser_version"]
          system  = h["platform"]["system"].lower()
          machine = h["platform"]["machine"].lower()

          slug = re.sub(
              r"[^a-z0-9._-]", "_",
              f"{browser}-{version}-{system}-{machine}"
          )

          target_dir = Path("fingerprints") / browser / version / system / machine
          target_dir.mkdir(parents=True, exist_ok=True)
          dest_base = target_dir / slug

          src = Path(f"fingerprints/{sid}.json")
          if src.exists():
              shutil.move(src, f"{dest_base}.json")

          vsrc = Path(f"fingerprints/{sid}.variation.json")
          if vsrc.exists():
              shutil.move(vsrc, f"{dest_base}.variation.json")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"FP_DIR={target_dir}\n")
              f.write(f"FP_SLUG={slug}\n")

          print(f"Fingerprint: {dest_base}", flush=True)
          PYEOF

      - name: Commit fingerprint
        shell: bash
        env:
          FP_DIR: ${{ env.FP_DIR }}
          FP_SLUG: ${{ env.FP_SLUG }}
        run: |
          git config user.email "fingerprint-bot@ege"
          git config user.name "fingerprint-bot"
          git add "${FP_DIR}/${FP_SLUG}.json" \
                  "${FP_DIR}/${FP_SLUG}.variation.json" 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing new to commit." && exit 0
          git commit -m "fingerprint: ${FP_SLUG}"

          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break
            echo "Push attempt $i failed, retrying in $((i * 3))s"
            sleep $((i * 3))
          done

      - name: Print server log
        if: always()
        shell: bash
        run: cat server.log
